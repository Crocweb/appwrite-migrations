name: Publier

# Publie sur npmjs.com à chaque tag vX.Y.Z. Le tag est la seule commande de
# publication : rien ne se publie depuis un poste.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Provenance npm : signe le lien entre le paquet publié et le commit qui
      # l'a produit. Ne fonctionne que depuis un dépôt public.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test

      # Garde-fou : le tag doit correspondre à la version du package.json,
      # sinon on publierait une version qui ne dit pas la vérité.
      - name: Le tag doit correspondre à la version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG ≠ package.json $PKG"
            exit 1
          fi

      # prepublishOnly compile dist/ — il n'est plus versionné.
      - run: pnpm publish --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
